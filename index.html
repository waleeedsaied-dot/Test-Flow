<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Automation Platform - TestFlow v2.0</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #121212;
      --surface: #1a1a2e;
      --pink: #FF0099;
      --green: #00FF85;
      --blue: #1E90FF;
      --yellow: #FFD700;
      --purple: #9D4EDD;
      --text: #E0E0E0;
      --muted: #666;
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
      line-height: 1.5;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(255, 0, 153, 0.06) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 100%, rgba(30, 144, 255, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2rem;
      background: rgba(18, 18, 18, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .nav-logo span {
      -webkit-text-fill-color: rgba(255, 255, 255, 0.4);
      font-weight: 300;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-badge {
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(255, 0, 153, 0.1);
      border: 1px solid rgba(255, 0, 153, 0.3);
      color: var(--pink);
    }

    .nav-link {
      padding: 0.32rem 0.65rem;
      border-radius: 6px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.25s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .nav-link:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-link.active {
      color: var(--pink);
      background: rgba(255, 0, 153, 0.15);
      border: 1px solid rgba(255, 0, 153, 0.2);
    }

    .nav-search {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.82rem;
      outline: none;
      color: var(--text);
      width: 180px;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      box-shadow: 0 0 20px rgba(255, 0, 153, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(255, 0, 153, 0.5);
      transform: translateY(-1px);
    }

    .btn-sm {
      padding: 0.35rem 0.8rem;
      font-size: 0.75rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      min-height: calc(100vh - 57px);
      position: relative;
      z-index: 1;
    }

    .sidebar {
      background: rgba(26, 26, 46, 0.5);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      overflow-y: auto;
    }

    .sidebar-section {
      margin-bottom: 2rem;
    }

    .sidebar-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 0.8rem;
      padding-left: 0.5rem;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 0.8rem;
      border-radius: 8px;
      font-size: 0.83rem;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
      margin-bottom: 0.2rem;
      border: 1px solid transparent;
    }

    .sidebar-item:hover {
      background: var(--glass);
      color: var(--text);
    }

    .sidebar-item.active {
      background: rgba(255, 0, 153, 0.1);
      color: var(--pink);
      border: 1px solid rgba(255, 0, 153, 0.2);
    }

    .sidebar-count {
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .main {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      animation: fadeIn 0.5s ease;
    }

    .main h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      overflow: hidden;
      margin-bottom: 1.5rem;
      animation: slideDown 0.4s ease;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-body {
      padding: 1.2rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
      animation: slideDown 0.4s ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .stat-card.red::before {
      background: linear-gradient(90deg, var(--pink), transparent);
    }

    .stat-card.blue::before {
      background: linear-gradient(90deg, var(--blue), transparent);
    }

    .stat-card.green::before {
      background: linear-gradient(90deg, var(--green), transparent);
    }

    .stat-card.purple::before {
      background: linear-gradient(90deg, var(--purple), transparent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin: 0.3rem 0 0.2rem;
    }

    .stat-card.red .stat-value {
      color: var(--pink);
    }

    .stat-card.blue .stat-value {
      color: var(--blue);
    }

    .stat-card.green .stat-value {
      color: var(--green);
    }

    .stat-card.purple .stat-value {
      color: var(--purple);
    }

    .stat-sub {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .sprint-info {
      display: flex;
      justify-content: space-around;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .sprint-stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .sprint-stat-lbl {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 4px;
      overflow: hidden;
      margin: 1rem 0 0.5rem;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--green), var(--blue));
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .bug-id {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: monospace;
    }

    .bug-title {
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .badge-blocker {
      background: rgba(255, 0, 153, 0.15);
      color: var(--pink);
      border: 1px solid rgba(255, 0, 153, 0.3);
    }

    .badge-major {
      background: rgba(255, 165, 0, 0.15);
      color: #FFA500;
      border: 1px solid rgba(255, 165, 0, 0.3);
    }

    .badge-minor {
      background: rgba(30, 144, 255, 0.15);
      color: var(--blue);
      border: 1px solid rgba(30, 144, 255, 0.3);
    }

    .badge-open {
      background: rgba(255, 165, 0, 0.1);
      color: #FFA500;
      border: 1px solid rgba(255, 165, 0, 0.2);
    }

    .badge-progress {
      background: rgba(30, 144, 255, 0.1);
      color: var(--blue);
      border: 1px solid rgba(30, 144, 255, 0.2);
    }

    .badge-fixed {
      background: rgba(0, 255, 133, 0.1);
      color: var(--green);
      border: 1px solid rgba(0, 255, 133, 0.2);
    }

    .badge-passed {
      background: rgba(0, 255, 133, 0.1);
      color: var(--green);
      border: 1px solid rgba(0, 255, 133, 0.2);
    }

    .badge-failed {
      background: rgba(255, 0, 153, 0.1);
      color: var(--pink);
      border: 1px solid rgba(255, 0, 153, 0.2);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.8rem;
    }

    .tab {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--muted);
      transition: all 0.15s;
      font-family: inherit;
    }

    .tab:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }

    .tab.active {
      color: var(--pink);
      background: rgba(255, 0, 153, 0.15);
      border: 1px solid rgba(255, 0, 153, 0.25);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      min-width: 260px;
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(4, 4, 10, 0.95);
      border: 1px solid var(--pink);
      color: white;
      box-shadow: 0 0 20px rgba(255, 0, 153, 0.4);
      animation: slideDown 0.4s ease;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 180px 1fr;
      }

      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .main {
        padding: 1rem;
      }

      .stats-row {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.75rem;
      }

      th, td {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const NAV = [
      { id: "dashboard", icon: "🏠", label: "Home" },

    const sidebarNav = [
      {

          { id: "dashboard", icon: "📊", label: "Dashboard" },

      {

          { id: "kanban", icon: "📋", label: "Kanban Board" },
          { id: "stories", icon: "🗂️", label: "User Stories" },
        ]
      },
      { 
        group: "AI Intelligence", 
        items: [
          { id: "aitriage", icon: "🤖", label: "AI Triage" },
          { id: "flows", icon: "🧠", label: "Flow Discovery" },
          { id: "predictions", icon: "🔮", label: "Predictions" },
        ]
      },
    ];

    function Toast({ msg, onDone }) {
      useEffect(() => {
        const timer = setTimeout(onDone, 3000);
        return () => clearTimeout(timer);
      }, [onDone]);

      return <div className="toast">{msg}</div>;
    }

    function DashboardContent() {
      return (
        <>
          <div className="stats-row">
            <div className="stat-card red">
              <div className="stat-label">Open Bugs</div>
              <div className="stat-value">2</div>
              <div className="stat-sub">2 critical need fix</div>
            </div>
            <div className="stat-card blue">

              <div className="stat-value">6</div>

            </div>
            <div className="stat-card green">
              <div className="stat-label">Pass Rate</div>

              <div className="stat-sub">↑ 2% vs last sprint</div>
            </div>
            <div className="stat-card purple">

              <div className="stat-value">83</div>
              <div className="stat-sub">↑ 5 pts this sprint</div>
            </div>
          </div>

          <div className="card">
            <div className="card-header">
              <div className="card-title">🗺️ Sprint 4 Progress <span style={{fontSize: '0.7rem', color: 'var(--muted)', fontWeight: 400}}>Mar 2 — Active Sprint</span></div>
            </div>
            <div className="card-body">
              <div className="sprint-info">
                <div>
                  <div className="sprint-stat-val" style={{color: 'var(--green)'}}>12</div>
                  <div className="sprint-stat-lbl">Done</div>
                </div>
                <div>
                  <div className="sprint-stat-val" style={{color: 'var(--blue)'}}>5</div>
                  <div className="sprint-stat-lbl">In Progress</div>
                </div>
                <div>
                  <div className="sprint-stat-val" style={{color: 'var(--pink)'}}>3</div>
                  <div className="sprint-stat-lbl">Blocked</div>
                </div>
                <div>
                  <div className="sprint-stat-val" style={{color: 'var(--muted)'}}>4</div>
                  <div className="sprint-stat-lbl">To Do</div>
                </div>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{width: '50%'}}></div>
              </div>
              <div className="progress-labels">
                <span>0</span>
                <span style={{color: 'var(--green)', fontWeight: 600}}>50% complete · Day 10</span>
                <span>24 stories</span>
              </div>

          </div>

          <div className="card">
            <div className="card-header">

              <button className="btn btn-primary btn-sm">+ New Bug</button>
            </div>
            <div style={{padding: '0 1.2rem'}}>
              <div className="tabs">

            </div>
            <table>

                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>

                  <td><span className="badge badge-blocker">blocker</span></td>

          <div className="grid-2">

                <div className="progress-bar">
                  <div className="progress-fill" style={{width: '94%'}}></div>
                </div>
                <div className="progress-labels" style={{marginTop: '0.8rem'}}>
                  <span>Last sprint: 91%</span>
                  <span style={{color: 'var(--green)', fontWeight: 600}}>+3% improvement</span>
                </div>
              </div>
            </div>
          </div>
        </>
      );
    }

    function BugsContent() {
      return (
        <div className="card">
          <div className="card-header">
            <div className="card-title">🐛 All Bugs</div>
            <button className="btn btn-primary btn-sm">+ New Bug</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Assignee</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td className="bug-id">BUG-234</td>
                <td className="bug-title">Payment fails on Safari</td>
                <td><span className="badge badge-blocker">blocker</span></td>
                <td><span className="badge badge-open">open</span></td>
                <td><span>Alice</span></td>
              </tr>
              <tr>
                <td className="bug-id">BUG-233</td>
                <td className="bug-title">Login email case sensitivity</td>
                <td><span className="badge badge-major">major</span></td>
                <td><span className="badge badge-progress">progress</span></td>
                <td><span>Bob</span></td>
              </tr>
              <tr>
                <td className="bug-id">BUG-231</td>
                <td className="bug-title">iOS Safari display issue</td>
                <td><span className="badge badge-blocker">blocker</span></td>
                <td><span className="badge badge-open">open</span></td>
                <td><span>Charlie</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      );
    }

    function TestsContent() {
      return (
        <div className="card">
          <div className="card-header">
            <div className="card-title">🧪 All Tests</div>
            <button className="btn btn-primary btn-sm">+ New Test</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Status</th>
                <th>Duration</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Login Flow</td>
                <td>UI</td>
                <td><span className="badge badge-passed">passed</span></td>
                <td>2.3s</td>
              </tr>
              <tr>
                <td>Checkout Process</td>
                <td>UI</td>
                <td><span className="badge badge-failed">failed</span></td>
                <td>5.1s</td>
              </tr>
              <tr>
                <td>API Authentication</td>
                <td>API</td>
                <td><span className="badge badge-passed">passed</span></td>
                <td>0.8s</td>
              </tr>
            </tbody>
          </table>
        </div>
      );
    }

    function AIContent() {
      return (
        <div className="card">
          <div className="card-header">
            <div className="card-title">🧠 AI Intelligence Panel</div>
          </div>
          <div className="card-body">
            <div style={{padding: '1rem', background: 'rgba(255,0,153,0.1)', borderRadius: '8px', marginBottom: '1rem'}}>
              <strong style={{color: 'var(--pink)'}}>🤖 AI Recommendations:</strong>
              <ul style={{marginTop: '0.5rem', marginLeft: '1.5rem', lineHeight: '1.8'}}>
                <li>Consider adding integration tests for payment flows</li>
                <li>Mobile tests show 15% higher failure rate - investigate environment</li>
                <li>API response times increased 20% - review database queries</li>
              </ul>
            </div>
          </div>
        </div>
      );
    }

    function AutomationContent() {
      return (
        <div className="card">
          <div className="card-header">
            <div className="card-title">🤖 Test Automation</div>
            <button className="btn btn-primary btn-sm">+ New Test</button>
          </div>
          <div className="card-body">
            <p style={{marginBottom: '1rem'}}>Configure automated test runs and CI/CD integration.</p>
            <button className="btn btn-primary" style={{marginRight: '0.5rem'}}>Run All Tests</button>
            <button className="btn" style={{background: 'var(--glass)', border: '1px solid var(--border)'}}>Configure Runner</button>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("dashboard");
      const [toast, setToast] = useState("");

      const getContent = () => {
        switch(page) {
          case "dashboard":
            return <DashboardContent />;
          case "bugs":
            return <BugsContent />;
          case "tests":
            return <TestsContent />;
          case "ai":
            return <AIContent />;
          case "automation":
            return <AutomationContent />;
          default:
            return <DashboardContent />;
        }
      };

      const handleAction = (action) => {
        setToast(`${action} action triggered!`);
      };

      return (
        <div style={{background: 'var(--bg)', color: 'var(--text)', minHeight: '100vh'}}>
          <nav>
            <div className="nav-logo">TestFlow <span>v2.0</span></div>
            <div style={{display: 'flex', gap: '0.3rem', flex: 1, marginLeft: '2rem'}}>
              {NAV.map(n => (
                <button
                  key={n.id}
                  className={`nav-link ${page === n.id ? 'active' : ''}`}
                  onClick={() => setPage(n.id)}
                >
                  {n.icon} {n.label}
                </button>
              ))}
            </div>
            <div className="nav-right">
              <input className="nav-search" placeholder="Search bugs, tests..." readOnly/>
              <button className="btn btn-sm" style={{background: 'var(--glass)', border: '1px solid var(--border)'}}>📥</button>
              <button className="btn btn-sm" style={{background: 'var(--glass)', border: '1px solid var(--border)'}}>✉️</button>
              <span className="nav-badge">Sprint 4</span>
              <button className="btn btn-primary btn-sm" onClick={() => handleAction('New Test')}>+ New Test</button>
              <div style={{width: 32, height: 32, borderRadius: '50%', background: 'linear-gradient(135deg,var(--pink),var(--purple))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.8rem', fontWeight: 700, cursor: 'pointer'}}>W</div>
            </div>
          </nav>

          <div className="layout">
            <aside className="sidebar">
              {sidebarNav.map(group => (
                <div key={group.group} className="sidebar-section">
                  <div className="sidebar-label">{group.group}</div>
                  {group.items.map(item => (
                    <div
                      key={item.id}
                      className={`sidebar-item ${page === item.id ? 'active' : ''}`}
                      onClick={() => setPage(item.id)}
                    >
                      <span>{item.icon}</span>
                      <span>{item.label}</span>
                      {item.badge && <span className="sidebar-count">{item.badge}</span>}
                    </div>
                  ))}
                </div>
              ))}
            </aside>

            <main className="main">
              <h2>{page === 'dashboard' ? 'Dashboard' : page.charAt(0).toUpperCase() + page.slice(1)}</h2>
              {getContent()}
            </main>
          </div>

          {toast && <Toast msg={toast} onDone={() => setToast("")} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
